name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install root deps
        run: |
          cd ../..
          npm install -g pnpm@9
          pnpm install --no-frozen-lockfile

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: 'https://api.00o-uz.workers.dev/api/v1'
          NEXT_PUBLIC_WS_URL: 'wss://api.00o-uz.workers.dev/ws'
          NEXT_PUBLIC_APP_URL: 'https://kryzensys.github.io/00o-platform'
          NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: 'ooouzbot'
          NEXT_PUBLIC_ENABLE_AI: 'true'
          NEXT_PUBLIC_ENABLE_MARKETPLACE: 'true'
          NEXT_PUBLIC_ENABLE_JOBS: 'true'
          NEXT_TELEMETRY_DISABLED: '1'
        run: |
          pnpm run build || (echo "Trying with npm..." && npm run build)

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Copy 404
        run: |
          if [ -f out/404.html ]; then
            echo "404 already exists"
          else
            cp out/index.html out/404.html
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
